<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GridTokenX — Export Harness</title>
<style>
  html, body { margin: 0; padding: 0; background: #0B0712; height: 100%; }
  * { box-sizing: border-box; }
  #frame { width: 402px; height: 874px; position: relative; overflow: hidden; background: #0B0712; transform-origin: center center; }
  #wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #0B0712; }
  @keyframes gtxBlink { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
  .gtx-blink { animation: gtxBlink 1.4s ease-in-out infinite; }
  @keyframes gtxScan { 0% { top: 16%; } 50% { top: 78%; } 100% { top: 16%; } }
  .gtx-scan { animation: gtxScan 2.2s ease-in-out infinite; }
  @keyframes gtxSpin { to { transform: rotate(360deg); } }
  .gtx-spin { animation: gtxSpin 1s linear infinite; }
  @keyframes gtxPulse { 0% { transform: scale(1); opacity: 0.9; } 100% { transform: scale(4.2); opacity: 0; } }
  .gtx-pulse { animation: gtxPulse 1.8s ease-out infinite; }
  @keyframes gtxFlow { to { stroke-dashoffset: -8; } }
  .gtx-flow { animation: gtxFlow 0.9s linear infinite; }
</style>
</head>
<body>
<div id="wrap"><div id="frame"></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="dashboard.jsx"></script>
<script type="text/babel" src="dashboard-easy.jsx"></script>
<script type="text/babel" src="wallet.jsx"></script>
<script type="text/babel" src="settings.jsx"></script>
<script type="text/babel" src="transfer.jsx"></script>
<script type="text/babel" src="register.jsx"></script>
<script type="text/babel" src="dca.jsx"></script>
<script type="text/babel" src="ndid.jsx"></script>
<script type="text/babel" src="ndid-profile.jsx"></script>
<script type="text/babel" src="extra-screens.jsx"></script>

<script type="text/babel">
  const SCREENS = {
    '01-welcome':       () => <Welcome />,
    '02-create':        () => <CreateAccount />,
    '03-verify':        () => <Verify />,
    '04-profile':       () => <Profile />,
    '05-success':       () => <Success />,
    '06-dashboard':     () => <Dashboard />,
    '06b-dashboard-easy': () => <DashboardEasy />,
    '07-wallet':        () => <WalletPage />,
    '08-settings':      () => <SettingsPage theme="dark" setTheme={() => {}} />,
    '09-deposit':       () => <DepositPage />,
    '10-withdraw':      () => <WithdrawPage />,
    '11-register':      () => <RegisterDevice />,
    '12-dca':           () => <DCAStrategy />,
    '13-verify-ndid':   () => <VerifyNDID />,
    '14-ndid-identity': () => <NDIDProfile />,
    '15-notifications': () => <NotificationsPage />,
    '16-order-history': () => <OrderHistory />,
  };
  window.SCREEN_NAMES = Object.keys(SCREENS);

  const frameEl = document.getElementById('frame');
  function fit() {
    const s = Math.min(window.innerWidth / 402, window.innerHeight / 874);
    frameEl.style.transform = 'scale(' + s + ')';
  }
  window.addEventListener('resize', fit);
  fit();
  const root = ReactDOM.createRoot(frameEl);
  window.renderScreen = (name) => {
    const C = SCREENS[name];
    root.render(C ? <C /> : <div style={{color:'#fff',padding:20}}>?</div>);
    fit();
    return name;
  };
  // default
  window.renderScreen('01-welcome');
</script>
</body>
</html>
